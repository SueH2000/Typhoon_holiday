<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>颱風假預測 App</title>
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <main class="container">
      <h1>颱風假預測 App</h1>
      <p class="hint">可直接在手機瀏覽器開啟，並加入主畫面當作 App 使用。</p>

      <label for="locationSelect">選擇地區</label>
      <select id="locationSelect"></select>

      <button id="predictBtn">查詢最新預測</button>

      <section id="result" class="card hidden"></section>
      <p id="error" class="error"></p>
    </main>

    <script>
      const locationSelect = document.getElementById('locationSelect');
      const predictBtn = document.getElementById('predictBtn');
      const resultEl = document.getElementById('result');
      const errorEl = document.getElementById('error');

      async function loadLocations() {
        errorEl.textContent = '';
        const response = await fetch('/app/locations');
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || '無法載入地區');
        }

        locationSelect.innerHTML = data.locations
          .map((name) => `<option value="${name}">${name}</option>`)
          .join('');
      }

      async function predict() {
        const locationName = locationSelect.value;
        errorEl.textContent = '';
        resultEl.classList.add('hidden');

        const response = await fetch(`/app/predict?locationName=${encodeURIComponent(locationName)}`);
        const data = await response.json();

        if (!data.ok) {
          throw new Error(data.error || '預測失敗');
        }

        resultEl.innerHTML = `
          <h2>${data.locationName}</h2>
          <p>天氣：${data.weather.description}</p>
          <p>溫度：${data.weather.temperature_c} °C</p>
          <p>雨量：${data.weather.rainfall_mm} mm</p>
          <p>風速：${data.weather.wind_speed_mps} m/s</p>
          <p><strong>放假機率：${data.dayoff_probability}%</strong></p>
          <p>建議：${data.advice}</p>
        `;
        resultEl.classList.remove('hidden');
      }

      predictBtn.addEventListener('click', async () => {
        try {
          await predict();
        } catch (error) {
          errorEl.textContent = error.message;
        }
      });

      loadLocations().catch((error) => {
        errorEl.textContent = error.message;
      });
    </script>
  </body>
</html>
